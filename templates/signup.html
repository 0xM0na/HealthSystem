{% load static %}  <!-- إضافة هذه السطر لتحميل الوسم static -->
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="form-wrapper">
            <h2>إنشاء حساب جديد</h2>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">اسم المستخدم:</label>
                    <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required>
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" id="email" name="email" placeholder="أدخل البريد الإلكتروني" required>
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور:</label>
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                </div>
                <button type="submit" class="btn">إنشاء الحساب</button>
            </form>
            
            <p>لديك حساب بالفعل؟ <a href="{% url 'signin' %}">تسجيل الدخول</a></p>
        </div>
    </div>
</body>
</html>
